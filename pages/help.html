<body>
    <h2>帮助中心</h2>
    <hr>
    <h3>一、如何登录？</h3>
    <p>在登录页面输入用户名和密码即可登录。默认管理员账号：admin / admin123。</p>
    <h3>二、如何注册？</h3>
    <p>点击导航栏的"注册"链接，填写用户名、密码、邮箱等信息即可完成注册。</p>
    <h3>三、如何充值？</h3>
    <p>登录后进入"个人中心"，在充值表单中输入金额点击充值即可。</p>
    <h3>四、如何上传头像？</h3>
    <p>登录后点击导航栏的"上传头像"，选择图片文件上传即可。</p>
    <h3>五、如何搜索用户？</h3>
    <p>登录后在首页搜索框中输入用户名或邮箱关键词进行搜索。</p>
    <hr>
    <p style="color:#999;font-size:12px;">© 2026 用户管理系统 - 帮助中心</p>
