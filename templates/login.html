<!-- 调试信息：默认账号请在部署后修改密码 -->
{% extends "base.html" %}

{% block content %}
<div class="card login-card">
    <h2 class="card-title">用户登录</h2>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" class="login-form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">登录</button>
    </form>

    <p class="form-footer-text">
        还没有账号？<a href="/register" class="form-footer-link">立即注册</a>
    </p>
</div>
{% endblock %}
