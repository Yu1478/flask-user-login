{% extends "base.html" %}

{% block content %}
<div class="card login-card">
    <h2 class="card-title">用户注册</h2>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if success %}
        <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="POST" action="/register" class="login-form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

        <div class="form-group">
            <label for="username">用户名 <span class="required">*</span></label>
            <input type="text" id="username" name="username" class="form-input" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码 <span class="required">*</span></label>
            <input type="password" id="password" name="password" class="form-input" placeholder="至少 6 位" required minlength="6">
        </div>
        <div class="form-group">
            <label for="confirm_password">确认密码 <span class="required">*</span></label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="再次输入密码" required minlength="6">
        </div>
        <div class="form-group">
            <label for="email">邮箱 <span class="required">*</span></label>
            <input type="email" id="email" name="email" class="form-input" placeholder="请输入邮箱" required>
        </div>
        <div class="form-group">
            <label for="phone">手机号</label>
            <input type="text" id="phone" name="phone" class="form-input" placeholder="选填">
        </div>
        <button type="submit" class="btn btn-primary btn-full">注册</button>
    </form>

    <p class="form-footer-text">
        已有账号？<a href="/login" class="form-footer-link">去登录</a>
    </p>
</div>
{% endblock %}
